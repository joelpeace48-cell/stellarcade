name: Test Smart Contracts

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.85.0
        with:
          toolchain: 1.85.0
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}

      - name: Build Contracts
        run: |
          cd contracts/shared && cargo build --locked --release
          cd ../prize-pool && cargo build --locked --target wasm32-unknown-unknown --release
          cd ../random-generator && cargo build --locked --target wasm32-unknown-unknown --release
          cd ../coin-flip && cargo build --locked --target wasm32-unknown-unknown --release
          cd ../multiplayer-room && cargo build --locked --target wasm32-unknown-unknown --release
          cd ../pattern-puzzle && cargo build --locked --target wasm32-unknown-unknown --release
          cd ../emergency-pause && cargo build --locked --target wasm32-unknown-unknown --release
          cd ../governance && cargo build --locked --target wasm32-unknown-unknown --release
          cd ../contract-role-registry && cargo build --locked --target wasm32-unknown-unknown --release

      - name: Run Tests
        run: |
          cd contracts/shared && cargo test --locked
          cd ../prize-pool && cargo test --locked
          cd ../random-generator && cargo test --locked
          cd ../coin-flip && cargo test --locked
          cd ../multiplayer-room && cargo test --locked
          cd ../pattern-puzzle && cargo test --locked
          cd ../emergency-pause && cargo test --locked
          cd ../governance && cargo test --locked
          cd ../contract-role-registry && cargo test --locked

      - name: Verify Contract Documentation
        run: |
          cargo run --package stellarcade-contract-doc-generator --manifest-path contracts/contract-doc-generator/Cargo.toml
          if [ -n "$(git status --porcelain docs/contracts)" ]; then
            echo "Error: Contract documentation is out of sync. Please run 'cargo run --package stellarcade-contract-doc-generator' and commit the changes."
            git diff docs/contracts
            exit 1
          fi
